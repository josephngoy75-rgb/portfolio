<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>

    <body>
        <header class="fixed top-0 w-full z-50 p-[2px] bg-[linear-gradient(to_right,#1B3A57,#2D7ECA,#1B3A57,#152B25,#19473A,#10AF82,#19473A,#19473A)]">
    
            <nav class="w-full px-6 md:px-12 py-4 flex justify-between items-center bg-[conic-gradient(from_180deg_at_50%_50%,#0C1321,#0C1322,#0F1829,#152A33)]">

                <div class="flex items-center">
                    <a href="index.html" class="text-xl font-bold tracking-tighter hover:scale-105 transition-transform duration-200">
                        <span class="text-[#2D7ECA]">M</span><span class="text-[#188693]">I</span><span class="text-[#10AF82]">E</span>
                    </a>
                </div>

                <div class="hidden md:flex items-center space-x-10">
                    <a href="cv.html" class="text-sm font-bold text-white hover:text-emerald-400 transition-colors uppercase">CV</a>
                    <a href="projets.html" class="text-sm font-bold text-white hover:text-emerald-400 transition-colors uppercase">Projets</a>
                    <a href="contact.html" class="text-sm font-bold text-white hover:text-emerald-400 transition-colors uppercase">Contact</a>
                    
                    <!-- BOUTON CTA -->
                    <a href="#" class="px-7 py-2.5 rounded-xl font-bold text-white bg-gradient-to-r from-[#2D7ECA] to-[#10AF82] hover:scale-[1.01] transition-transform duration-200">
                        Travailler ensemble
                    </a>
                </div>

                <!-- Bouton Menu Mobile-->
                <div class="md:hidden text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
            </nav>
        </header>

        <main class="min-h-screen w-full flex flex-col items-center bg-[conic-gradient(from_180deg_at_50%_50%,#152A33_30%,#0C1321_55%,#0C1322_40%,#152A33_70%)]">


            <div class="flex flex-col md:flex-row items-center justify-center gap-8 md:gap-16 px-6 pt-20 md:pt-40">
                
                <!-- Conteneur Photo -->
                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-[#2D7ECA] to-[#10AF82] rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
                    <div class="relative w-48 h-48 md:w-64 md:h-64 rounded-full overflow-hidden border-2 border-white/10 shadow-2xl">
                        <img 
                        src="images/joseph.ngoy.jpg" 
                        alt="Joseph Ngoy" 
                        class="w-full h-full object-cover"
                        />
                    </div>
                </div>

                <!-- Conteneur Nom -->
                <div class="flex flex-col text-center md:text-left">

                    <h1 class="text-white text-6xl md:text-8xl font-bold tracking-tight leading-tight">
                        Joseph
                    </h1>
                    
                    <h2 class="text-6xl md:text-8xl font-bold tracking-tight leading-none pb-4
                                bg-clip-text text-transparent bg-gradient-to-r from-[#2D7ECA] to-[#10AF82]">
                        Ngoy
                    </h2> 
                </div>
            </div>

            <!-- SOUS-TITRE -->
            <div class="mt-12 text-center px-6">
                <p class="text-white font-bold text-lg md:text-2xl tracking-wide">
                Economist | Trader | Full Stack Web Development
                </p>
                
                <p class="mt-6 max-w-3xl text-slate-400 text-base md:text-lg leading-relaxed mx-auto">
                Je combine analyse économique, trading stratégique et création digitale pour concevoir des <br class="hidden md:block"> solutions modernes orientées performance.
                </p>
            </div>

            <!-- BOUTONS D'ACTION -->
            <div class="mt-10 flex flex-col sm:flex-row gap-5 items-center justify-center">
                
                <a href="projets.html" class="group flex items-center gap-2 px-8 py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-[#2D7ECA] to-[#10AF82] hover:scale-[1.02] transition-all duration-300">
                Voir mes projets
                <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </a>

                <a href="contact.html" class="px-10 py-3.5 rounded-xl font-bold text-white bg-[#0f172a]/80 border border-slate-800 hover:bg-slate-800 transition-all duration-300">
                Me contacter
                </a>
            </div>
        </main>

  </body>
</html>
